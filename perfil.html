<ul id="lista"></ul>

<script>
let datos = JSON.parse(localStorage.getItem("historial"));

datos.forEach(item => {
  let li = document.createElement("li");
  li.textContent = item;
  document.getElementById("lista").appendChild(li);
});
</script>
